<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextHire – AI Resume & Portfolio Builder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
  <div class="auth-wrapper" style="min-height: 100vh;">
    <div class="auth-card card" style="max-width: 420px; width: 100%; padding: 0; overflow: hidden;">
      <div style="padding: 2.5rem 2rem 1.5rem; text-align: center;">
        <div class="logo" style="justify-content: center; font-size: 1.8rem; margin-bottom: 0.5rem;">
          <div class="logo-icon">&Delta;</div>
          <span>NextHire</span>
        </div>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Build professional resumes and live portfolios in minutes.</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login">Log In</div>
        <div class="auth-tab" id="tab-signup">Sign Up</div>
      </div>

      <div class="auth-body">
        <!-- Login Form -->
        <form class="auth-form active" id="form-login">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" required placeholder="name@example.com">
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn-submit">
            <span>Log In</span>
          </button>
        </form>

        <!-- Signup Form -->
        <form class="auth-form" id="form-signup">
          <div class="form-group">
            <label for="signup-email">Email Address</label>
            <input type="email" id="signup-email" required placeholder="name@example.com">
          </div>
          <div class="form-group">
            <label for="signup-password">Password (min 6 chars)</label>
            <input type="password" id="signup-password" required placeholder="••••••••">
          </div>
          <div class="form-group">
            <label for="signup-confirm">Confirm Password</label>
            <input type="password" id="signup-confirm" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="signup-btn-submit">
            <span>Create Account</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Tab switching logic
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const formLogin = document.getElementById('form-login');
    const formSignup = document.getElementById('form-signup');

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabSignup.classList.remove('active');
      formLogin.classList.add('active');
      formSignup.classList.remove('active');
    });

    tabSignup.addEventListener('click', () => {
      tabSignup.classList.add('active');
      tabLogin.classList.remove('active');
      formSignup.classList.add('active');
      formLogin.classList.remove('active');
    });

    // Handle Login Submit
    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const submitBtn = document.getElementById('login-btn-submit');

      // Show spinner
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>';

      try {
        const response = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem('token', data.token);
          showToast('Welcome back!', 'success');
          setTimeout(() => {
            window.location.href = 'resume.html';
          }, 800);
        } else {
          showToast(data.message || 'Login failed', 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span>Log In</span>';
        }
      } catch (err) {
        showToast('Connection error. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Log In</span>';
      }
    });

    // Handle Signup Submit
    formSignup.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      const submitBtn = document.getElementById('signup-btn-submit');

      if (password !== confirm) {
        showToast('Passwords do not match', 'error');
        return;
      }

      // Show spinner
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>';

      try {
        const response = await apiFetch('/auth/signup', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem('token', data.token);
          showToast('Account created successfully!', 'success');
          setTimeout(() => {
            window.location.href = 'resume.html';
          }, 800);
        } else {
          showToast(data.message || (data.errors && data.errors[0].msg) || 'Registration failed', 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span>Create Account</span>';
        }
      } catch (err) {
        showToast('Connection error. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Create Account</span>';
      }
    });
  </script>
</body>
</html>
